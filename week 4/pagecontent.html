<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Page Content</title>
    <style>
        /* Một chút CSS cơ bản để giao diện giống hình mẫu hơn */
        body {
            font-family: serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        section {
            border: 2px solid #aebac1;
            padding: 15px;
            background-color: #d9e0e3;
        }
        article {
            border: 2px solid #aebac1;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #d9e0e3;
        }
        header {
            border: 1px solid #aebac1;
            padding: 5px 10px;
            margin-bottom: 10px;
        }
        h2 { margin: 0; font-size: 1.5em; }
        p.meta { font-style: italic; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <section>
        <article>
            <header>
                <h2>Just Another Day</h2>
                <p class="meta">Written by Christina on January 11th</p>
            </header>
            <p>This is my second blog entry, and I just wanted to check in on you</p>
        </article>

        <article>
            <header>
                <h2>My First Blog Entry</h2>
                <p class="meta">Written by Christina on January 10th</p>
            </header>
            <p>I'm so happy to write my first blog entry – yay!</p>
        </article>
    </section>

</body>
</html>
